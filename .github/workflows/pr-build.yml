name: PR Build and Test

on:
  push:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      elasticsearch:
        image: elasticsearch:6.3.2
        env:
          discovery.type: single-node
          bootstrap.memory_lock: "true"
          "ES_JAVA_OPTS": "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

      cassandra:
        image: cassandra:3.11
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'SELECT 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'adopt'
        cache: 'maven'

    - name: Create logs directory
      run: |
        mkdir -p ~/logs/dialcode/
        find . -type f -name "logback.xml" -print0 | xargs -0 sed -i -e 's/\/data\/logs/logs/g'
        find . -type f -name "application.conf" -print0 | xargs -0 sed -i -e 's/\/data\//~\//g'
        find . -type f -name "*.java" -print0 | xargs -0 sed -i -e 's/\/data\//~\//g'

    - name: Add Log4j2 Core Dependency
      run: |
        echo '<dependency>
          <groupId>org.apache.logging.log4j</groupId>
          <artifactId>log4j-core</artifactId>
          <version>2.20.0</version>
        </dependency>' > log4j2-core.xml
        xmlstarlet ed -L -s "//dependencies" -t elem -n "dependency" -v "" pom.xml
        xmlstarlet ed -L -i "//dependencies/dependency[last()]" -t elem -n "groupId" -v "org.apache.logging.log4j" pom.xml
        xmlstarlet ed -L -i "//dependencies/dependency[last()]" -t elem -n "artifactId" -v "log4j-core" pom.xml
        xmlstarlet ed -L -i "//dependencies/dependency[last()]" -t elem -n "version" -v "2.20.0" pom.xml

    - name: Wait for Services
      run: |
        echo "Waiting for Elasticsearch..."
        timeout 60 bash -c 'until curl -s http://localhost:9200/_cluster/health | grep -q "\"status\":\"green\"\\|\"status\":\"yellow\""; do sleep 2; done'
        echo "Waiting for Cassandra..."
        timeout 60 bash -c 'until cqlsh -e "SELECT 1" > /dev/null 2>&1; do sleep 2; done'

    - name: Build with Maven and Generate Coverage Report
      run: mvn clean scoverage:report

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: target/scala-2.11/scoverage-report/
        retention-days: 7

