name: PR Build and Test

on:
  push:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.13
        env:
          discovery.type: single-node
          bootstrap.memory_lock: "true"
          xpack.security.enabled: false
          "ES_JAVA_OPTS": "-Xms1g -Xmx1g"
          cluster.name: "docker-cluster"
          network.host: "0.0.0.0"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10
          --memory=2g
          --ulimit nofile=65535:65535
          --ulimit memlock=-1:-1

      cassandra:
        image: cassandra:3.11
        env:
          MAX_HEAP_SIZE: 512M
          HEAP_NEWSIZE: 128M
          CASSANDRA_CLUSTER_NAME: "Test Cluster"
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'SELECT 1'"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10
          --memory=1g
          --ulimit nofile=100000:100000

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'adopt'
        cache: 'maven'

    - name: Install Required Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xmlstarlet curl cqlsh

    - name: Create logs directory
      run: |
        mkdir -p ~/logs/dialcode/
        find . -type f -name "logback.xml" -print0 | xargs -0 sed -i -e 's/\/data\/logs/logs/g'
        find . -type f -name "application.conf" -print0 | xargs -0 sed -i -e 's/\/data\//~\//g'
        find . -type f -name "*.java" -print0 | xargs -0 sed -i -e 's/\/data\//~\//g'

    - name: Add Log4j2 Core Dependency
      run: |
        echo '<dependency>
          <groupId>org.apache.logging.log4j</groupId>
          <artifactId>log4j-core</artifactId>
          <version>2.20.0</version>
        </dependency>' > log4j2-core.xml
        xmlstarlet ed -L -s "//dependencies" -t elem -n "dependency" -v "" pom.xml
        xmlstarlet ed -L -i "//dependencies/dependency[last()]" -t elem -n "groupId" -v "org.apache.logging.log4j" pom.xml
        xmlstarlet ed -L -i "//dependencies/dependency[last()]" -t elem -n "artifactId" -v "log4j-core" pom.xml
        xmlstarlet ed -L -i "//dependencies/dependency[last()]" -t elem -n "version" -v "2.20.0" pom.xml

    - name: Initialize Elasticsearch
      run: |
        echo "Waiting for Elasticsearch to be ready..."
        timeout 120 bash -c 'until curl -s http://localhost:9200/_cluster/health | grep -q "\"status\":\"green\"\\|\"status\":\"yellow\""; do sleep 5; echo "Waiting for Elasticsearch..."; done'
        echo "Creating Elasticsearch indices..."
        curl -X PUT "localhost:9200/dialcode" -H "Content-Type: application/json" -d '{
          "settings": {
            "number_of_shards": 1,
            "number_of_replicas": 0
          }
        }'
        curl -X PUT "localhost:9200/dialcode/_mapping" -H "Content-Type: application/json" -d '{
          "properties": {
            "dialcode": { "type": "keyword" },
            "channel": { "type": "keyword" },
            "status": { "type": "keyword" },
            "metadata": { "type": "object" }
          }
        }'

    - name: Initialize Cassandra
      run: |
        echo "Waiting for Cassandra to be ready..."
        timeout 120 bash -c 'until cqlsh -e "SELECT 1" > /dev/null 2>&1; do sleep 5; echo "Waiting for Cassandra..."; done'
        echo "Creating Cassandra keyspace and tables..."
        cqlsh -e "CREATE KEYSPACE IF NOT EXISTS dialcode WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
        cqlsh -e "USE dialcode; CREATE TABLE IF NOT EXISTS dialcode (dialcode text PRIMARY KEY, channel text, status text, metadata map<text, text>);"

    - name: Build with Maven and Generate Coverage Report
      run: mvn clean scoverage:report

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: target/scala-2.11/scoverage-report/
        retention-days: 7

