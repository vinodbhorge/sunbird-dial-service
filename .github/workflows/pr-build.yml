name: PR Build and Test

on:
  push:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'adopt'
        cache: 'maven'

    - name: Install Elasticsearch
      run: |
        curl -O https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-6.3.2.deb
        sudo dpkg -i --force-confnew elasticsearch-6.3.2.deb
        sudo service elasticsearch restart
        sleep 10

    - name: Create logs directory
      run: |
        mkdir -p ~/logs/dialcode/
        find . -type f -name "log4j2.xml" -print0 | xargs -0 sed -i -e 's/\/data\/logs/~\/logs/g'
        find . -type f -name "logback.xml" -print0 | xargs -0 sed -i -e 's/\/data\/logs/logs/g'
        find . -type f -name "application.conf" -print0 | xargs -0 sed -i -e 's/\/data\//~\//g'
        find . -type f -name "*.java" -print0 | xargs -0 sed -i -e 's/\/data\//~\//g'

    - name: Build with Maven and Generate Coverage Report
      run: mvn clean scoverage:report

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-report
        path: target/scala-2.11/scoverage-report/
        retention-days: 7

    - name: Notify on Failure
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_CHANNEL: builds
        SLACK_COLOR: danger
        SLACK_TITLE: Build Failed
        SLACK_MESSAGE: 'Build failed for PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}'
        SLACK_FOOTER: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} 